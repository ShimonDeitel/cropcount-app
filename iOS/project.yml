name: Cropcount
options:
  bundleIdPrefix: com.shimondeitel.gardenvalue
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Cropcount:
    type: application
    platform: iOS
    sources:
      - path: Cropcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenvalue
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Cropcount/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CropcountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CropcountTests
    dependencies:
      - target: Cropcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenvalue.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CropcountUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CropcountUITests
    dependencies:
      - target: Cropcount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gardenvalue.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Cropcount:
    build:
      targets:
        Cropcount: all
        CropcountTests: [test]
        CropcountUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Cropcount.storekit
    test:
      config: Debug
      storeKitConfiguration: Cropcount.storekit
      targets:
        - CropcountTests
        - CropcountUITests
    archive:
      config: Release
